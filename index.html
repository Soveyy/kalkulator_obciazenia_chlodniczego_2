<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zaawansowany Kalkulator Zysków Ciepła</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f1f5f9" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "chart.js/": "https://aistudiocdn.com/chart.js@^4.5.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "chart.js": "https://aistudiocdn.com/chart.js@^4.5.1",
    "jspdf": "https://aistudiocdn.com/jspdf@^2.5.1",
    "html2canvas": "https://aistudiocdn.com/html2canvas@^1.4.1",
    "jspdf-autotable": "https://aistudiocdn.com/jspdf-autotable@^3.8.2"
  }
}
</script>
<style>
    @keyframes pulse-border {
        0% { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
        50% { border-color: rgba(59, 130, 246, 1); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
        100% { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
    }
    .animate-pulse-border {
        animation: pulse-border 2s infinite ease-in-out;
    }

    @keyframes pulse-error {
        0% { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
        50% { border-color: rgba(239, 68, 68, 1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.3); }
        100% { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
    }
    .animate-pulse-error {
        animation: pulse-error 1.5s infinite ease-in-out;
        border-color: #ef4444 !important;
    }

    @keyframes pulse-glow {
        0%, 100% {
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
        }
        50% {
            box-shadow: 0 0 0 8px rgba(59, 130, 246, 0);
        }
    }
    .animate-pulse-glow {
        animation: pulse-glow 2.5s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; border-color: inherit; }
        50% { opacity: 0.7; border-color: #3b82f6; }
    }
    .animate-blink {
        animation: blink 1.5s infinite;
    }

    @keyframes attention-bounce {
        0%, 100% { transform: translateY(0); box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); }
        50% { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); border-color: rgba(59, 130, 246, 0.8); }
    }
    .animate-attention {
        animation: attention-bounce 2s infinite ease-in-out;
    }

    @keyframes breathe {
        0%, 100% { 
            border-color: rgba(79, 70, 229, 0.4); 
            box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.1);
            background-color: rgba(238, 242, 255, 0.5);
        }
        50% { 
            border-color: rgba(79, 70, 229, 0.8); 
            box-shadow: 0 0 12px 2px rgba(79, 70, 229, 0.2);
            background-color: rgba(238, 242, 255, 0.8);
        }
    }
    .animate-breathe {
        animation: breathe 3s infinite ease-in-out;
    }

    .chart-container:fullscreen,
    .chart-container:-webkit-full-screen {
        background-color: white;
        width: 100% !important;
        height: 100% !important;
        display: flex !important;
        flex-direction: column !important;
        padding: 1rem !important;
        box-sizing: border-box !important;
    }
    .dark .chart-container:fullscreen,
    .dark .chart-container:-webkit-full-screen {
        background-color: #1e293b; /* bg-slate-800 */
    }

    /* We will handle rotation via JS/CSS classes more carefully if needed, 
       but for now let's ensure it doesn't break the layout on exit */

    /* Styles for collapsible section */
    .collapsible-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-in-out;
    }
    .collapsible-content.expanded {
        max-height: 500px; /* Adjust as needed for table height */
    }
    .label-style {
        display: block;
        font-size: 0.875rem;
        margin-bottom: 0.25rem;
        color: #334155;
    }
    .dark .label-style {
        color: #cbd5e1;
    }
</style>
<link rel="stylesheet" href="/index.css">
    <script>
        // Skrypt czyszczący, aby usunąć Service Workery i wyczyścić cache, które mogą blokować odświeżanie podglądu
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
    </script>
</head>
<body class="bg-slate-100 dark:bg-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
